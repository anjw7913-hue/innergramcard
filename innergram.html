<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innergram</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0;
    --white: #ffffff;
    --text: #2c2825;
    --text-sub: #8c877f;
    --text-dim: #bdb8b0;
    --border: #e8e3db;
    --emotion:  #f4a76a; --emotion-bg:#fef4ec; --emotion-border:#f4c49a;
    --self:     #7eb8d4; --self-bg:   #edf5fa; --self-border:   #a8d4e8;
    --relation: #84c49a; --relation-bg:#edf7f0;--relation-border:#a8d8b8;
    --trauma:   #b89fd4; --trauma-bg: #f3eefa; --trauma-border: #ccb8e8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100vh; display:flex; flex-direction:column;
  }

  /* Header */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:28px 48px; background:var(--white); border-bottom:1px solid var(--border);
  }
  .logo { font-family:'Playfair Display',serif; font-size:22px; letter-spacing:.04em; }
  .logo em { font-style:italic; color:var(--text-sub); }
  .counter { font-size:12px; color:var(--text-dim); letter-spacing:.05em; }

  /* Main */
  main { flex:1; display:flex; align-items:center; justify-content:center; gap:60px; padding:48px; }

  /* ── Card Scene ── */
  .card-scene {
    position:relative; width:380px; height:500px;
    flex-shrink:0; perspective:1200px;
    isolation: isolate;
  }

  /* Deck ghost cards (shuffle visual) */
  .deck-ghost {
    position:absolute;
    width:320px; height:440px;
    border-radius:22px;
    background: linear-gradient(145deg, #ddd0c0, #c8b8a5);
    border: 1px solid #cfc0ae;
    left:50%; top:24px;
    transform-origin:center bottom;
    will-change:transform;
  }
  .ghost-1 { transform:translateX(-50%) rotate(4deg);  opacity:.5;  z-index:1; }
  .ghost-2 { transform:translateX(-50%) rotate(-2deg); opacity:.7;  z-index:2; }
  .ghost-3 { transform:translateX(-50%) rotate(1deg);  opacity:.85; z-index:3; }

  /* Flipper */
  .card-flipper {
    position:absolute;
    width:340px; height:460px;
    top:10px; left:50%;
    transform:translateX(-50%);
    transform-style:preserve-3d;
    transition:transform .65s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
    z-index:10;
  }
  .card-flipper.is-flipped { transform:translateX(-50%) rotateY(180deg); }

  /* Card faces */
  .card-face {
    position:absolute; inset:0;
    border-radius:24px;
    border:1px solid var(--border);
    box-shadow:0 4px 24px rgba(0,0,0,.08);
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    overflow:hidden;
  }

  /* Back */
  .card-back {
    background: linear-gradient(155deg, #e8ddd0 0%, #d9c9b8 35%, #c8b8a8 65%, #d4c4b0 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    border: 1px solid #cfc0ae;
    overflow:hidden;
  }
  /* 대각선 라인 + 도트 패턴 */
  .card-back-pattern {
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(
        55deg,
        rgba(255,255,255,0.22) 0px,
        rgba(255,255,255,0.22) 1px,
        transparent 1px,
        transparent 24px
      ),
      radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px);
    background-size: 24px 24px, 18px 18px;
    border-radius:24px;
  }
  /* 빛 번짐 — 웜 아이보리 */
  .card-back-glow1 {
    position:absolute; top:-20%; left:-15%;
    width:65%; height:65%;
    background: radial-gradient(circle, rgba(255,245,230,0.55) 0%, transparent 65%);
    pointer-events:none; border-radius:50%;
  }
  /* 빛 번짐 — 로즈 베이지 */
  .card-back-glow2 {
    position:absolute; bottom:-20%; right:-10%;
    width:60%; height:60%;
    background: radial-gradient(circle, rgba(200,170,150,0.4) 0%, transparent 65%);
    pointer-events:none; border-radius:50%;
  }
  /* 빛 번짐 — 라이트 탄 */
  .card-back-glow3 {
    position:absolute; top:35%; right:-20%;
    width:50%; height:50%;
    background: radial-gradient(circle, rgba(230,215,195,0.35) 0%, transparent 65%);
    pointer-events:none; border-radius:50%;
  }
  .card-back-logo {
    font-family:'Playfair Display',serif; font-size:30px; font-style:italic;
    color:rgba(80,60,45,0.75); letter-spacing:.08em;
    position:relative; z-index:1;
    text-shadow: 0 1px 8px rgba(255,245,235,0.6);
  }
  .card-back-sub {
    font-size:10px; color:rgba(100,80,65,0.55); letter-spacing:.2em;
    text-transform:uppercase; position:relative; z-index:1;
  }
  .card-back-tap {
    margin-top:10px; font-size:11px; color:rgba(100,80,65,0.55);
    letter-spacing:.06em; position:relative; z-index:1;
    display:flex; align-items:center; gap:8px;
  }
  .tap-icon {
    width:28px; height:28px; border-radius:50%;
    border:1.5px solid rgba(120,95,75,0.3);
    display:flex; align-items:center; justify-content:center;
    font-size:13px; color:rgba(100,80,65,0.65);
  }

  /* Front */
  .card-front {
    background:var(--white); transform:rotateY(180deg);
    display:flex; flex-direction:column; padding:40px 36px 36px;
  }
  .card-stripe { position:absolute; top:0; left:0; right:0; height:4px; border-radius:24px 24px 0 0; }
  .card-front.emotion  .card-stripe { background:var(--emotion); }
  .card-front.self     .card-stripe { background:var(--self); }
  .card-front.relation .card-stripe { background:var(--relation); }
  .card-front.trauma   .card-stripe { background:var(--trauma); }

  .card-num { font-family:'Playfair Display',serif; font-size:52px; font-style:italic; line-height:1; margin-bottom:20px; margin-top:8px; }
  .card-front.emotion  .card-num { color:#fce4cc; }
  .card-front.self     .card-num { color:#cce5f2; }
  .card-front.relation .card-num { color:#cceedd; }
  .card-front.trauma   .card-num { color:#e4d8f5; }

  .card-q { font-family:'Gowun Batang',serif; font-size:16px; line-height:1.9; color:var(--text); flex:1; letter-spacing:.01em; }
  .card-hint-wrap { margin-top:24px; padding-top:20px; border-top:1px solid var(--border); }
  .card-hint { font-family:'Gowun Batang',serif; font-size:12.5px; color:var(--text-sub); line-height:1.8; font-style:italic; }

  /* ── 촤르륵 셔플: JS로 동적 생성된 카드들이 날아와 쌓임 ── */
  @keyframes whoosh-card {
    0%   { transform: translateX(var(--from-x)) translateY(var(--from-y)) rotate(var(--from-r)) scale(0.85); opacity: 0; }
    18%  { opacity: 1; }
    55%  { transform: translateX(var(--mid-x))  translateY(var(--mid-y))  rotate(var(--mid-r))  scale(1.02); opacity: 1; }
    80%  { transform: translateX(var(--to-x))   translateY(var(--to-y))   rotate(var(--to-r))   scale(1);    opacity: 1; }
    100% { transform: translateX(var(--to-x))   translateY(var(--to-y))   rotate(var(--to-r))   scale(1);    opacity: 0; }
  }
  .whoosh-card {
    position: absolute;
    width: 340px; height: 460px;
    top: 10px; left: 50%;
    border-radius: 24px;
    border: 1px solid #cfc0ae;
    background: linear-gradient(155deg, #e8ddd0 0%, #d9c9b8 35%, #c8b8a8 65%, #d4c4b0 100%);
    pointer-events: none;
    z-index: 5;
    animation: whoosh-card var(--dur) cubic-bezier(.2,.8,.3,1) var(--delay) both;
    will-change: transform, opacity;
    overflow: hidden;
  }
  .whoosh-card::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(55deg, rgba(255,255,255,0.18) 0px, rgba(255,255,255,0.18) 1px, transparent 1px, transparent 24px),
      radial-gradient(circle, rgba(255,255,255,0.22) 1px, transparent 1px);
    background-size: 24px 24px, 18px 18px;
    border-radius: 24px;
  }

  /* 메인 덱은 셔플 중 살짝 오른쪽으로 기울어 고정 */
  @keyframes deck-hold {
    0%,100% { transform: translateX(-50%); }
    10%,90% { transform: translateX(calc(-50% + 8px)) rotate(2deg); }
  }
  .card-flipper.shuffling { animation: deck-hold 1.6s ease forwards; }

  /* Slide transitions */
  @keyframes slide-out-left  { from{transform:translateX(-50%) translateX(0) rotate(0);opacity:1} to{transform:translateX(-50%) translateX(-100px) rotate(-7deg);opacity:0} }
  @keyframes slide-in-right  { from{transform:translateX(-50%) translateX(100px) rotate(7deg);opacity:0} to{transform:translateX(-50%) translateX(0) rotate(0);opacity:1} }
  @keyframes slide-out-right { from{transform:translateX(-50%) translateX(0) rotate(0);opacity:1} to{transform:translateX(-50%) translateX(100px) rotate(7deg);opacity:0} }
  @keyframes slide-in-left   { from{transform:translateX(-50%) translateX(-100px) rotate(-7deg);opacity:0} to{transform:translateX(-50%) translateX(0) rotate(0);opacity:1} }
  .card-flipper.out-left  { animation:slide-out-left  .28s ease forwards; }
  .card-flipper.in-right  { animation:slide-in-right  .32s ease forwards; pointer-events:none; }
  .card-flipper.out-right { animation:slide-out-right .28s ease forwards; }
  .card-flipper.in-left   { animation:slide-in-left   .32s ease forwards; pointer-events:none; }

  /* Controls */
  .nav-row { display:flex; align-items:center; gap:12px; justify-content:center; margin-top:32px; }
  .nav-btn {
    width:44px; height:44px; border-radius:50%;
    border:1.5px solid var(--border); background:var(--white);
    color:var(--text-sub); font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all .2s; box-shadow:0 2px 8px rgba(0,0,0,.05);
  }
  .nav-btn:hover { border-color:var(--text-sub); color:var(--text); }
  .nav-btn-main {
    padding:0 28px; border-radius:40px; height:44px;
    background:var(--text); color:#fff;
    font-size:13px; font-family:'DM Sans',sans-serif; letter-spacing:.04em;
    border:none; cursor:pointer; transition:all .2s;
    box-shadow:0 2px 12px rgba(44,40,37,.2);
  }
  .nav-btn-main:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(44,40,37,.25); }
  .nav-btn-main.outline {
    background:var(--white); color:var(--text);
    border:1.5px solid var(--border);
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  .nav-btn-main.outline:hover { border-color:var(--text-sub); }

  .progress-dots { display:flex; gap:5px; justify-content:center; margin-top:16px; flex-wrap:wrap; max-width:220px; margin-left:auto; margin-right:auto; }
  .dot { width:5px; height:5px; border-radius:50%; background:var(--border); transition:all .3s; cursor:pointer; }
  .dot.active { background:var(--text); width:16px; border-radius:3px; }

  .shuffle-hint { margin-top:12px; font-size:11px; color:var(--text-dim); letter-spacing:.07em; text-align:center; }

  /* Side list */
  .side-list { width:280px; flex-shrink:0; }
  .side-title { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-dim); margin-bottom:16px; }
  .side-empty { font-family:'Gowun Batang',serif; font-size:13px; color:var(--text-dim); line-height:1.8; font-style:italic; text-align:center; padding:32px 0; }

  .list-wrap { display:flex; flex-direction:column; gap:2px; max-height:480px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; padding-right:4px; }

  .list-item {
    display:flex; align-items:flex-start; gap:10px;
    padding:10px 12px; border-radius:10px; cursor:pointer; transition:background .15s;
    animation:list-appear .35s ease forwards;
    opacity:0;
  }
  @keyframes list-appear {
    from { opacity:0; transform:translateY(8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .list-item:hover { background:var(--white); }
  .list-item.active { background:var(--white); box-shadow:0 1px 6px rgba(0,0,0,.06); }
  .list-num { font-size:10px; color:var(--text-dim); flex-shrink:0; margin-top:3px; min-width:18px; }
  .list-item.active .list-num { color:var(--text-sub); }
  .list-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-top:5px; }
  .list-text { font-family:'Gowun Batang',serif; font-size:12.5px; line-height:1.65; color:var(--text-sub); }
  .list-item.active .list-text { color:var(--text); }

  @media (max-width:860px) {
    main { flex-direction:column; padding:32px 24px; gap:32px; }
    .side-list { width:100%; max-width:360px; }
    header { padding:20px 24px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo" onclick="resetToStart()" style="cursor:pointer">Inner<em>gram</em></div>
  <span class="counter" id="counter">— / 32</span>
</header>

<main>
  <div style="display:flex;flex-direction:column;align-items:center">

    <div class="card-scene">
      <!-- Deck ghost cards -->
      <div class="deck-ghost ghost-1" id="ghost1"></div>
      <div class="deck-ghost ghost-2" id="ghost2"></div>
      <div class="deck-ghost ghost-3" id="ghost3"></div>

      <!-- Flipper -->
      <div class="card-flipper" id="cardFlipper" onclick="handleCardClick()">
        <div class="card-face card-back">
          <div class="card-back-pattern"></div>
          <div class="card-back-glow1"></div>
          <div class="card-back-glow2"></div>
          <div class="card-back-glow3"></div>
          <svg viewBox="0 0 340 460" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;z-index:2;">

            <!-- 외곽 장식 테두리 -->
            <rect x="18" y="18" width="304" height="424" rx="14" ry="14"
              fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
            <rect x="26" y="26" width="288" height="408" rx="10" ry="10"
              fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8"/>

            <!-- 모서리 꽃잎 장식 (4개) -->
            <!-- 좌상 -->
            <g transform="translate(44,44)">
              <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
              <line x1="-14" y1="0" x2="14" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
              <line x1="0" y1="-14" x2="0" y2="14" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
              <circle cx="0" cy="0" r="3" fill="rgba(255,255,255,0.35)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(0)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(90)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(180)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(270)"/>
            </g>
            <!-- 우상 -->
            <g transform="translate(296,44)">
              <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
              <line x1="-14" y1="0" x2="14" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
              <line x1="0" y1="-14" x2="0" y2="14" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
              <circle cx="0" cy="0" r="3" fill="rgba(255,255,255,0.35)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(0)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(90)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(180)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(270)"/>
            </g>
            <!-- 좌하 -->
            <g transform="translate(44,416)">
              <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
              <line x1="-14" y1="0" x2="14" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
              <line x1="0" y1="-14" x2="0" y2="14" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
              <circle cx="0" cy="0" r="3" fill="rgba(255,255,255,0.35)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(0)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(90)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(180)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(270)"/>
            </g>
            <!-- 우하 -->
            <g transform="translate(296,416)">
              <circle cx="0" cy="0" r="10" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
              <line x1="-14" y1="0" x2="14" y2="0" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
              <line x1="0" y1="-14" x2="0" y2="14" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>
              <circle cx="0" cy="0" r="3" fill="rgba(255,255,255,0.35)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(0)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(90)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(180)"/>
              <ellipse cx="0" cy="-7" rx="3" ry="5" fill="rgba(255,255,255,0.12)" transform="rotate(270)"/>
            </g>

            <!-- 중앙 태양/만다라 -->
            <g transform="translate(170,200)">
              <!-- 방사선 -->
              <g stroke="rgba(255,255,255,0.13)" stroke-width="0.8">
                <line x1="0" y1="-90" x2="0" y2="90"/>
                <line x1="-90" y1="0" x2="90" y2="0"/>
                <line x1="-63" y1="-63" x2="63" y2="63"/>
                <line x1="63" y1="-63" x2="-63" y2="63"/>
                <line x1="-34" y1="-82" x2="34" y2="82"/>
                <line x1="34" y1="-82" x2="-34" y2="82"/>
                <line x1="-82" y1="-34" x2="82" y2="34"/>
                <line x1="82" y1="-34" x2="-82" y2="34"/>
              </g>

              <!-- 외곽 원 -->
              <circle cx="0" cy="0" r="88" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
              <circle cx="0" cy="0" r="80" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="0.6"/>

              <!-- 바깥 꽃잎 (12장) -->
              <g fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.9">
                <ellipse cx="0" cy="-64" rx="7" ry="14" transform="rotate(0)"/>
                <ellipse cx="0" cy="-64" rx="7" ry="14" transform="rotate(30)"/>
                <ellipse cx="0" cy="-64" rx="7" ry="14" transform="rotate(60)"/>
                <ellipse cx="0" cy="-64" rx="7" ry="14" transform="rotate(90)"/>
                <ellipse cx="0" cy="-64" rx="7" ry="14" transform="rotate(120)"/>
                <ellipse cx="0" cy="-64" rx="7" ry="14" transform="rotate(150)"/>
                <ellipse cx="0" cy="-64" rx="7" ry="14" transform="rotate(180)"/>
                <ellipse cx="0" cy="-64" rx="7" ry="14" transform="rotate(210)"/>
                <ellipse cx="0" cy="-64" rx="7" ry="14" transform="rotate(240)"/>
                <ellipse cx="0" cy="-64" rx="7" ry="14" transform="rotate(270)"/>
                <ellipse cx="0" cy="-64" rx="7" ry="14" transform="rotate(300)"/>
                <ellipse cx="0" cy="-64" rx="7" ry="14" transform="rotate(330)"/>
              </g>

              <!-- 중간 원 -->
              <circle cx="0" cy="0" r="46" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>

              <!-- 안쪽 꽃잎 (8장) -->
              <g fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.22)" stroke-width="0.8">
                <ellipse cx="0" cy="-30" rx="6" ry="12" transform="rotate(0)"/>
                <ellipse cx="0" cy="-30" rx="6" ry="12" transform="rotate(45)"/>
                <ellipse cx="0" cy="-30" rx="6" ry="12" transform="rotate(90)"/>
                <ellipse cx="0" cy="-30" rx="6" ry="12" transform="rotate(135)"/>

  {id:26, cat:'trauma',   q:'그 상처가 지금의 나에게 어떤 영향을 주고 있다고 느끼나요?',                     hint:'영향을 안다는 것은 이미 치유의 일부예요.'},
  {id:27, cat:'trauma',   q:'그때의 나에게 지금의 내가 해줄 수 있는 말이 있다면 무엇인가요?',               hint:'천천히, 아주 천천히 그 말을 꺼내도 괜찮아요.'},
  {id:28, cat:'trauma',   q:'그 경험을 통해 내가 배운 것이 있다면 무엇인가요? 그 배움이 편안하게 느껴지나요?', hint:'배움이 무겁게 느껴진다면, 그것도 괜찮아요.'},
  {id:29, cat:'trauma',   q:'상처를 준 사람이나 상황을 지금 어떻게 바라보고 있나요?',                       hint:'어떻게 바라보든, 그 시선은 지금 당신의 것이에요.'},
  {id:30, cat:'trauma',   q:'치유된다는 것이 나에게 어떤 의미인가요?',                                      hint:'치유는 잊는 것이 아닐 수도 있어요.'},
  {id:31, cat:'trauma',   q:'내가 스스로를 용서하는 것이 필요한 부분이 있다면 무엇인가요?',                 hint:'자기 용서는 때로 가장 어려운 일이기도 해요.'},
  {id:32, cat:'trauma',   q:'그 상처를 더 이상 혼자 지지 않아도 된다면, 어떤 기분이 들 것 같나요?',        hint:'그 기분을 상상하는 것만으로도 충분히 용감한 일이에요.'},
];

let filtered = [...ALL_CARDS];
let idx = 0;
let isFlipped = false;
let hasStarted = false;
let busy = false;

// 열어본 질문 누적 (순서 보존, 중복 id 제거)
let seenIds = [];

function loadCard() {
  const card = filtered[idx];
  const front = document.getElementById('cardFront');
  front.className = 'card-face card-front ' + card.cat;
  document.getElementById('cardNum').textContent  = String(idx + 1).padStart(2, '0');
  document.getElementById('cardQ').textContent    = card.q;
  document.getElementById('cardHint').textContent = card.hint;
  updateCounter();
  renderDots();
}

function updateCounter() {
  const total = filtered.length;
  const seen  = seenIds.length;
  document.getElementById('counter').textContent = seen > 0
    ? `${seen} / ${total}`
    : `— / ${total}`;
}

/* ── 카드 클릭: 뒷면 → 앞면 ── */
function handleCardClick() {
  if (busy || isFlipped) return;
  const flipper = document.getElementById('cardFlipper');
  flipper.classList.add('is-flipped');
  isFlipped = true;

  // 열어본 질문에 추가
  const card = filtered[idx];
  if (!seenIds.includes(card.id)) {
    seenIds.push(card.id);
    addToList(card);
    updateCounter();
  } else {
    highlightListItem(card.id);
  }

  if (!hasStarted) {
    hasStarted = true;
    document.getElementById('shuffleSection').style.display = 'none';
    const nav = document.getElementById('navSection');
    nav.style.display = 'flex';
  }
}

/* ── 다음 카드 ── */
function nextCard() {
  if (busy) return;
  busy = true;
  const flipper = document.getElementById('cardFlipper');

  flipper.classList.add('out-left');
  setTimeout(() => {
    flipper.classList.remove('out-left', 'is-flipped');
    isFlipped = false;
    idx = (idx + 1) % filtered.length;
    loadCard();
    flipper.classList.add('in-right');
    setTimeout(() => {
      flipper.classList.remove('in-right');
      setTimeout(() => {
        flipper.classList.add('is-flipped');
        isFlipped = true;
        // 열어본 질문 추가
        const card = filtered[idx];
        if (!seenIds.includes(card.id)) {
          seenIds.push(card.id);
          addToList(card);
          updateCounter();
        } else {
          highlightListItem(card.id);
        }
        busy = false;
      }, 150);
    }, 320);
  }, 280);
}

/* ── 이전 카드 ── */
function prevCard() {
  if (busy) return;
  busy = true;
  const flipper = document.getElementById('cardFlipper');

  flipper.classList.add('out-right');
  setTimeout(() => {
    flipper.classList.remove('out-right', 'is-flipped');
    isFlipped = false;
    idx = (idx - 1 + filtered.length) % filtered.length;
    loadCard();
    flipper.classList.add('in-left');
    setTimeout(() => {
      flipper.classList.remove('in-left');
      setTimeout(() => {
        flipper.classList.add('is-flipped');
        isFlipped = true;
        const card = filtered[idx];
        if (!seenIds.includes(card.id)) {
          seenIds.push(card.id);
          addToList(card);
          updateCounter();
        } else {
          highlightListItem(card.id);
        }
        busy = false;
      }, 150);
    }, 320);
  }, 280);
}

/* ── 첫 화면으로 초기화 ── */
function resetToStart() {
  if (busy) return;

  const flipper = document.getElementById('cardFlipper');

  // 카드 뒷면으로
  flipper.classList.remove('is-flipped');
  isFlipped = false;

  // 인덱스 초기화
  idx = 0;
  loadCard();

  // 열어본 질문 초기화
  seenIds = [];
  const wrap = document.getElementById('listWrap');
  wrap.innerHTML = '';
  const empty = document.createElement('div');
  empty.className = 'side-empty';
  empty.id = 'sideEmpty';
  empty.innerHTML = '아직 열어본 질문이 없어요.<br>카드를 탭해 시작해보세요.';
  wrap.appendChild(empty);
  updateCounter();
  renderDots();

  // 버튼 UI 첫 화면으로
  hasStarted = false;
  document.getElementById('shuffleSection').style.display = 'flex';
  document.getElementById('navSection').style.display = 'none';
}

/* ── 촤르륵 셔플 ── */
function doShuffle() {
  if (busy) return;
  busy = true;

  const flipper = document.getElementById('cardFlipper');
  const scene   = document.querySelector('.card-scene');

  // 앞면이면 뒤집기
  flipper.classList.remove('is-flipped');
  isFlipped = false;
  flipper.classList.add('shuffling');

  // 카드가 날아올 방향 설정 (오른쪽에서 왼쪽으로 촤르륵)
  const CARD_COUNT = 8;
  const TOTAL_DUR  = 1500; // 전체 시간 ms

  for (let i = 0; i < CARD_COUNT; i++) {
    const delay = i * (TOTAL_DUR / CARD_COUNT / 1.6); // 각 카드 시차 (ms)
    const dur   = 480 + Math.random() * 80;            // 개별 카드 지속 시간

    // 시작: 오른쪽 바깥에서
    const fromX = `${120 + Math.random() * 40}px`;
    const fromY = `${-20 + Math.random() * 40}px`;
    const fromR = `${8 + Math.random() * 10}deg`;

    // 중간: 덱 위를 빠르게 가로지름
    const midX  = `${-10 + Math.random() * 20 - 50}px`;
    const midY  = `${-30 - Math.random() * 20}px`;
    const midR  = `${-6 + Math.random() * 12 - 50}deg`;

    // 착지: 덱 위에 자연스럽게 안착
    const toX   = `${-4 + Math.random() * 8}px`;
    const toY   = `${2 + Math.random() * 4}px`;
    const toR   = `${-3 + Math.random() * 6}deg`;

    const card = document.createElement('div');
    card.className = 'whoosh-card';
    card.style.cssText = `
      --from-x:${fromX}; --from-y:${fromY}; --from-r:${fromR};
      --mid-x:${midX};   --mid-y:${midY};   --mid-r:${midR};
      --to-x:${toX};     --to-y:${toY};     --to-r:${toR};
      --dur:${dur}ms; --delay:${delay}ms;
    `;
    scene.appendChild(card);

    // 애니메이션 끝나면 제거
    setTimeout(() => card.remove(), delay + dur + 100);
  }

  // 중간에 실제 데이터 섞기 + 열어본 질문 초기화
  setTimeout(() => {
    for (let i = filtered.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
    }
    idx = 0;
    loadCard();

    // 열어본 질문 초기화
    seenIds = [];
    const wrap = document.getElementById('listWrap');
    wrap.innerHTML = '';
    const empty = document.createElement('div');
    empty.className = 'side-empty';
    empty.id = 'sideEmpty';
    empty.innerHTML = '아직 열어본 질문이 없어요.<br>카드를 탭해 시작해보세요.';
    wrap.appendChild(empty);
    updateCounter();
    renderDots();
  }, TOTAL_DUR * 0.5);

  setTimeout(() => {
    flipper.classList.remove('shuffling');
    // 버튼 UI를 첫 화면 상태로 되돌리기
    hasStarted = false;
    document.getElementById('shuffleSection').style.display = 'flex';
    document.getElementById('navSection').style.display = 'none';
    busy = false;
  }, TOTAL_DUR + 200);
}

/* ── 사이드 리스트: 새 항목 추가 ── */
function addToList(card) {
  const wrap = document.getElementById('listWrap');
  // 처음 추가 시 empty 메시지 제거
  const empty = document.getElementById('sideEmpty');
  if (empty) empty.remove();

  const c = CAT[card.cat];
  const item = document.createElement('div');
  item.className = 'list-item active';
  item.dataset.cardId = card.id;
  item.innerHTML = `
    <span class="list-num">${String(seenIds.length).padStart(2,'0')}</span>
    <span class="list-dot" style="background:${c.dot}"></span>
    <span class="list-text">${card.q}</span>`;

  // 기존 active 해제
  wrap.querySelectorAll('.list-item.active').forEach(el => el.classList.remove('active'));
  wrap.appendChild(item);
  item.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

/* ── 사이드 리스트: 현재 카드 하이라이트 ── */
function highlightListItem(cardId) {
  const wrap = document.getElementById('listWrap');
  wrap.querySelectorAll('.list-item').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.cardId) === cardId);
  });
  const active = wrap.querySelector('.list-item.active');
  if (active) active.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

/* ── 진행 도트 ── */
function renderDots() {
  const wrap = document.getElementById('dots');
  if (!wrap) return;
  wrap.innerHTML = '';
  filtered.forEach((card, i) => {
    const d = document.createElement('div');
    const isSeen = seenIds.includes(card.id);
    d.className = 'dot' + (i === idx ? ' active' : '');
    d.style.background = i === idx ? 'var(--text)' : isSeen ? '#c8c3bb' : 'var(--border)';
    wrap.appendChild(d);
  });
}

// 초기화
loadCard();
</script>
